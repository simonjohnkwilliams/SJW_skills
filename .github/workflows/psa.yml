name: psa

on:
  push:
    paths:
      - "prompt-structure-auditor/**"
      - ".github/workflows/psa.yml"
  pull_request:
    paths:
      - "prompt-structure-auditor/**"
      - ".github/workflows/psa.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prompt-structure-auditor/scripts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Unit / functional / acceptance
        run: pytest -q
      - name: CLI smoke (R1–R6)
        run: |
          python -m psa doctor tests/fixtures/vr3_demo
          python -m psa audit tests/fixtures/vr3_demo
          python -m psa audit tests/fixtures/vr3_demo --format json > /tmp/audit.json
          python -m psa baseline save tests/fixtures/empty_repo --out /tmp/base.json
          python -m psa diff tests/fixtures/vr3_demo --baseline /tmp/base.json
          python -m psa patch preview ORDER001 tests/fixtures/vr3_demo > /tmp/preview.diff
          python -m psa patch validate ORDER001 tests/fixtures/vr3_demo
